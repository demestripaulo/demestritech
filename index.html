<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DemestriTech · by OrEmet LLC</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Sans:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="lang-switch">
        <button class="lang-btn active">EN</button>
        <button class="lang-btn">PT</button>
      </div>
    </header>

    <main>
      <div id="particles"></div>
      <div class="card">
        <h1>NEW SITE<br />ARRIVING IN</h1>
        <p>
          We are launching our new site very soon - stay tuned and get ready for an amazing experience, crafted by top architects and engineers of Anthropic!
        </p>
        <div class="timer">
          <div class="timer-bar" id="timerBar"></div>
        </div>
        <div class="countdown">
          <span>Launch in <span id="cdNum">10</span> seconds</span>
          <span>Click to hold</span>
        </div>
        <a href="https://buy.stripe.com/test_28o8wjchQ4aXflKeUU" class="btn">
          Notify Me on Launch
        </a>
      </div>
    </main>

    <script>
      const TOTAL = 10000,
        INTERVAL = 25,
        targetHref = "https://anthropic.com";
      let elapsed = 0;
      const bar = document.getElementById("timerBar");
      const cdNum = document.getElementById("cdNum");
      const timer = setInterval(() => {
        elapsed += INTERVAL;
        bar.style.width = Math.max(0, 100 - (elapsed / TOTAL) * 100) + "%";
        cdNum.textContent = Math.ceil((TOTAL - elapsed) / 1000);
        if (elapsed >= TOTAL) {
          clearInterval(timer);
          window.location.href = targetHref;
        }
      }, INTERVAL);
      document
        .querySelectorAll(".lang-btn")
        .forEach((b) => b.addEventListener("click", () => clearInterval(timer)));
      const pc = document.getElementById("particles");
      for (let i = 0; i < 22; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.cssText = `left:${Math.random() * 100}%;bottom:${
          Math.random() * -10
        }%;--dx:${(Math.random() - 0.5) * 80}px;animation-duration:${
          8 + Math.random() * 14
        }s;animation-delay:${Math.random() * 10}s;width:${
          1 + Math.random() * 2
        }px;height:${1 + Math.random() * 2}px;`;
        pc.appendChild(p);
      }
    </script>
  </body>
</html>
